<style>
:root{
  --bg:#0a0a0c; --panel:#16171b; --panel2:#202228; --line:#3a3d45;
  --txt:#e9ebf0; --dim:#9298a3; --accent:#c8cdd7;
  --jiju:#22c55e; --free:#f59e0b; --machine:#ef4444; --band:#6366f1; --cardio:#14b8a6;
  --go:#22c55e; --rest:#fbbf24; --danger:#ef4444;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;}
body{background:
    radial-gradient(135% 95% at 50% -15%, rgba(206,211,221,.12), rgba(206,211,221,0) 48%),
    radial-gradient(120% 80% at 50% 115%, rgba(150,158,172,.07), rgba(0,0,0,0) 55%),
    var(--bg);
  background-attachment:fixed;background-repeat:no-repeat;
  color:var(--txt);font-family:'IBM Plex Sans JP',system-ui,sans-serif;min-height:100dvh;
  padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);overflow-x:hidden;}
.wrap{max-width:480px;margin:0 auto;padding:16px 16px 84px;min-height:100dvh;}
.mono{font-family:'IBM Plex Mono',monospace;}
button{font-family:inherit;cursor:pointer;}
input,select{font-family:inherit;}

.top{display:flex;align-items:center;gap:10px;margin-bottom:2px;}
.logo{font-size:20px;font-weight:700;letter-spacing:.5px;}
.apptop{text-align:center;margin:6px 0 18px;padding-bottom:13px;border-bottom:1px solid var(--line);}
.apptitle{font-family:'IBM Plex Mono',monospace;font-size:19px;font-weight:700;letter-spacing:3px;line-height:1.25;}
.apptitle .ttl{background:linear-gradient(180deg,#ffffff,#aab0bc);-webkit-background-clip:text;background-clip:text;color:transparent;}
.apptitle .pre{display:block;font-size:10px;letter-spacing:5px;color:var(--dim);font-weight:600;margin-bottom:4px;}
.logo small{color:var(--accent);}
.sub{color:var(--dim);font-size:12px;margin:4px 0 16px;line-height:1.5;}
.h2{font-size:13px;font-weight:700;letter-spacing:2px;color:var(--accent);text-transform:uppercase;margin:18px 0 10px;}

/* tab bar */
.tabbar{position:fixed;left:0;right:0;bottom:0;background:#0d0e11;border-top:1px solid var(--line);
  display:flex;max-width:480px;margin:0 auto;padding:8px 8px calc(8px + env(safe-area-inset-bottom));z-index:50;}
.tabbar button{flex:1;background:none;border:none;color:var(--dim);font-size:11px;font-weight:600;padding:6px 0;display:flex;flex-direction:column;align-items:center;gap:3px;}
.tabbar button.on{color:var(--accent);}
.tabbar .ic{font-size:19px;}
.hambtn{position:fixed;top:calc(env(safe-area-inset-top, 0px) + 10px);right:calc(env(safe-area-inset-right, 0px) + 12px);z-index:55;background:var(--panel);border:1px solid var(--line);color:var(--accent);width:40px;height:40px;border-radius:10px;font-size:18px;display:flex;align-items:center;justify-content:center;cursor:pointer;}
.menuwrap{position:fixed;inset:0;z-index:70;display:none;}
.menu-backdrop{position:absolute;inset:0;background:rgba(0,0,0,.55);}
.menu-panel{position:absolute;top:0;right:0;height:100%;width:66%;max-width:300px;background:#121316;border-left:1px solid var(--line);padding:calc(env(safe-area-inset-top, 0px) + 54px) 14px 14px;display:flex;flex-direction:column;gap:7px;box-shadow:-8px 0 24px rgba(0,0,0,.4);}
.menu-ttl{color:var(--dim);font-size:12px;font-weight:700;margin-bottom:4px;}
.menu-item{background:var(--panel);border:1px solid var(--line);color:var(--txt);border-radius:11px;padding:14px;font-size:15px;font-weight:600;display:flex;align-items:center;gap:11px;text-align:left;cursor:pointer;}
.menu-item .ic{font-size:18px;}

/* cards / buttons */
.card{background:var(--panel);border:1px solid var(--line);border-left:5px solid var(--c,var(--accent));border-radius:14px;padding:15px 15px;margin-bottom:11px;}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.grid2 .card{margin-bottom:0;}
.row{display:flex;justify-content:space-between;align-items:center;gap:10px;}
.wk-name{font-size:17px;font-weight:700;}
.wk-meta{color:var(--dim);font-size:12px;margin-top:3px;line-height:1.5;}
.go{color:var(--c,var(--accent));font-size:22px;font-weight:700;background:none;border:none;}
.btn{width:100%;padding:16px;border-radius:13px;border:none;font-size:16px;font-weight:700;}
.btn-primary{background:linear-gradient(180deg,#eef0f4,#bcc1cc);color:#14161b;}
.btn-accent{background:var(--accent);color:#14161b;}
.btn-line{width:100%;background:var(--panel);border:1px dashed var(--line);color:var(--dim);padding:14px;border-radius:13px;font-size:14px;font-weight:600;}
.btn-row{display:flex;gap:10px;}
.ghost{flex:1;background:var(--panel);border:1px solid var(--line);color:var(--dim);padding:13px;border-radius:11px;font-size:14px;font-weight:600;}
.ghost:active,.card:active{background:var(--panel2);}
.mini{background:var(--panel2);border:1px solid var(--line);color:var(--dim);border-radius:8px;padding:6px 10px;font-size:12px;font-weight:600;}
.del{color:var(--danger);background:none;border:none;font-size:13px;font-weight:600;}

.chip{padding:7px 12px;border-radius:999px;border:1px solid var(--line);background:var(--panel);color:var(--dim);font-size:12px;font-weight:600;}
.chip.on{background:var(--accent);color:#14161b;border-color:var(--accent);}
.chips{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:12px;}
.ptags{display:flex;flex-wrap:wrap;gap:5px;margin-top:6px;}
.ptag{font-size:10px;font-weight:600;color:var(--accent);background:rgba(34,211,238,.10);border:1px solid var(--line);border-radius:999px;padding:2px 8px;}
.rpill{font-size:11px;font-weight:700;color:#04140f;padding:3px 11px;border-radius:999px;white-space:nowrap;}

.tag{display:inline-block;font-size:10px;font-weight:700;padding:2px 8px;border-radius:999px;color:#04140f;}

label.fld{display:block;margin-bottom:12px;}
label.fld .lb{font-size:12px;color:var(--dim);margin-bottom:5px;display:block;font-weight:600;}
.in{width:100%;background:var(--panel2);border:1px solid var(--line);color:var(--txt);border-radius:10px;padding:12px;font-size:15px;}
.in:focus{outline:none;border-color:var(--accent);}
.two{display:flex;gap:10px;}
.two>*{flex:1;}

/* run screen */
.runhead{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;}
.back{background:none;border:none;color:var(--dim);font-size:14px;font-weight:600;padding:6px 2px;}
.wkttl{font-size:14px;font-weight:700;color:var(--accent);}
.prog{height:5px;border-radius:3px;background:var(--panel2);overflow:hidden;margin:6px 0 14px;}
.prog>i{display:block;height:100%;background:var(--accent);transition:width .3s;}
.counter{color:var(--dim);font-size:12px;text-align:center;margin-bottom:2px;letter-spacing:.5px;}
.stage{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;padding:26px 0 14px;min-height:46dvh;}
.phase-tag{font-size:13px;font-weight:700;letter-spacing:2px;text-transform:uppercase;}
.exname{font-size:22px;font-weight:700;text-align:center;line-height:1.3;padding:0 6px;}
.bignum{font-size:84px;font-weight:700;line-height:1;color:var(--accent);}
.bigtxt{font-size:42px;font-weight:700;line-height:1.1;text-align:center;color:var(--go);}
.unit{font-size:14px;color:var(--dim);font-weight:600;}
.pips{display:flex;gap:7px;margin-top:4px;}
.pip{width:11px;height:11px;border-radius:50%;background:var(--panel2);border:1px solid var(--line);}
.pip.done{background:var(--accent);border-color:var(--accent);}
.pip.cur{background:transparent;border-color:var(--accent);box-shadow:0 0 0 2px rgba(34,211,238,.25) inset;}
.next{color:var(--dim);font-size:12px;text-align:center;margin-top:6px;min-height:16px;}
.acts{display:flex;flex-direction:column;gap:10px;margin-top:8px;}

/* calendar */
.cal-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;}
.cal-dow{color:var(--dim);font-size:11px;text-align:center;padding:4px 0;font-weight:600;}
.cal-cell{aspect-ratio:1;border-radius:9px;background:var(--panel);border:1px solid var(--line);display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:13px;position:relative;}
.cal-cell.empty{background:none;border:none;}
.cal-ic{font-size:9px;line-height:1.1;margin-top:1px;letter-spacing:-1px;}
.cal-bar{position:absolute;left:4px;right:4px;bottom:3px;height:4px;background:var(--line);border-radius:2px;overflow:hidden;}
.cal-bar i{display:block;height:100%;}
.cal-seg{display:flex;gap:6px;margin-bottom:12px;}
.cal-seg button{flex:1;padding:7px 0;border-radius:9px;border:1px solid var(--line);background:var(--panel);color:var(--dim);font-size:12px;font-weight:600;}
.cal-seg button.on{background:var(--accent);color:#14161b;border-color:var(--accent);}
.emojigrid{display:grid;grid-template-columns:repeat(6,1fr);gap:6px;margin-top:4px;}
.emojigrid button{aspect-ratio:1;border-radius:10px;border:1px solid var(--line);background:var(--panel);font-size:20px;}
.emojigrid button.on{border-color:var(--accent);background:rgba(34,211,238,.14);}
.cal-cell.today{border-color:var(--accent);}
.cal-cell .dot{width:6px;height:6px;border-radius:50%;background:var(--go);position:absolute;bottom:6px;}
.cal-cell.sel{border-color:var(--accent);background:var(--panel2);}
.dot.note{background:var(--rest);top:5px;right:5px;bottom:auto;left:auto;}
.cal-cell.has{cursor:pointer;}
.note{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:12px 14px;color:var(--dim);font-size:12px;line-height:1.6;margin-top:10px;}
.empty-msg{color:var(--dim);font-size:13px;text-align:center;padding:30px 10px;line-height:1.7;}
.sess{background:var(--panel);border:1px solid var(--line);border-radius:11px;padding:11px 13px;margin-bottom:9px;}
.sess .d{font-size:12px;color:var(--accent);font-weight:700;}
.sess .b{font-size:13px;margin-top:4px;line-height:1.6;}
.mapwrap{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:8px 8px 6px;margin-bottom:10px;}
.mfig{width:100%;max-width:280px;display:block;margin:2px auto 2px;touch-action:manipulation;}
.mfig .body{fill:#141b27;stroke:#273243;stroke-width:1;}
.mfig .mz{fill:rgba(116,178,255,.13);stroke:#3a4a63;stroke-width:1;cursor:pointer;transition:fill .12s;}
.mfig .mz:hover{fill:rgba(116,178,255,.28);}
.mfig .mz.on{fill:var(--accent);stroke:var(--accent);}
.mfig .ml{font-size:7px;fill:var(--accent);text-anchor:middle;font-weight:700;pointer-events:none;paint-order:stroke;stroke:#0b0f16;stroke-width:2.6px;stroke-linejoin:round;}
</style>
</head>
<body>

<script>
/* ================= storage ================= */

  get(k,def){ try{ const v=localStorage.getItem(k); return v?JSON.parse(v):def; }catch(e){ return def; } },
  set(k,v){ try{ localStorage.setItem(k,JSON.stringify(v)); }catch(e){} }
};
const CATS=['自重','フリーウェイト','マシン','バンド','有酸素'];

    {p:'肩 中部', lab:[120,56], s:'<ellipse cx="68" cy="84" rx="8" ry="11"/><ellipse cx="172" cy="84" rx="8" ry="11"/>'},
    {p:'胸 上部', lab:[120,91], s:'<rect x="92" y="84" width="56" height="13" rx="6"/>'},
    {p:'胸 中部', lab:[120,105],s:'<rect x="92" y="98" width="56" height="13" rx="6"/>'},

    {p:'前脛骨筋', lab:[120,300], s:'<ellipse cx="107" cy="302" rx="8" ry="28"/><ellipse cx="133" cy="302" rx="8" ry="28"/>'},
  ],
  back:[
    {p:'僧帽筋', lab:[120,84], s:'<path d="M120,60 L152,92 L120,114 L88,92 Z"/>'},
    {p:'肩 後部', lab:[120,70], s:'<ellipse cx="86" cy="82" rx="15" ry="11"/><ellipse cx="154" cy="82" rx="15" ry="11"/>'},
    {p:'肩 中部', lab:[120,56], s:'<ellipse cx="68" cy="86" rx="8" ry="11"/><ellipse cx="172" cy="86" rx="8" ry="11"/>'},
    {p:'三頭筋', lab:[44,118], s:'<ellipse cx="68" cy="118" rx="9" ry="18"/><ellipse cx="172" cy="118" rx="9" ry="18"/>'},

    {p:'広背筋', lab:[120,122], s:'<ellipse cx="100" cy="132" rx="12" ry="22"/><ellipse cx="140" cy="132" rx="12" ry="22"/>'},
    {p:'脊柱起立筋', lab:[120,152], s:'<rect x="113" y="118" width="14" height="46" rx="4"/>'},

    {p:'ハムストリングス', lab:[120,242], s:'<ellipse cx="105" cy="244" rx="14" ry="32"/><ellipse cx="135" cy="244" rx="14" ry="32"/>'},

function muscleMap(parts){
  const side=S.mapSide==='back'?'back':'front';
  const zones=MMAP[side].map(r=>{
    const on=parts.includes(r.p);
    const lab=on?`<text class="ml" x="${r.lab[0]}" y="${r.lab[1]}">${esc(r.p)}</text>`:'';
    return `<g class="mz ${on?'on':''}" onclick="togglePart('${r.p}')"><title>${esc(r.p)}</title>${r.s}</g>${lab}`;
  }).join('');
  return `<div class="mapwrap">
    <div class="chips" style="justify-content:center;margin-bottom:4px">
      <button class="chip ${side==='front'?'on':''}" onclick="S.mapSide='front';render()">前面</button>
      <button class="chip ${side==='back'?'on':''}" onclick="S.mapSide='back';render()">背面</button>
    </div>
    <svg class="mfig" viewBox="0 0 240 360" xmlns="http://www.w3.org/2000/svg"><g class="body">${BODY_SIL}</g>${zones}</svg>
    <div class="note" style="text-align:center;margin:0;border:0;padding:6px 4px 2px;background:none">図の筋肉をタップで選択（最大3つ）。タップすると名前が出ます。インナーや細かい部位は下の一覧からどうぞ。</div>
  </div>`;
}
const DEFAULT_RECOV={
  '胸 上部':48,'胸 中部':48,'胸 下部':48,
  '肩 前部':48,'肩 中部':48,'肩 後部':48,

  ['クランチ','自重','reps',['腹直筋 上部']],['レッグレイズ','自重','reps',['腹直筋 下部']],['懸垂','自重','reps',['広背筋','二頭筋']],
  ['プランク','自重','time',['体幹深部']],['バーピー','自重','reps',['大腿四頭筋','胸 中部','体幹深部']],
  ['ダンベルカール','フリーウェイト','reps',['二頭筋']],['ベンチプレス','フリーウェイト','reps',['胸 中部','三頭筋','肩 前部']],
  ['デッドリフト','フリーウェイト','reps',['脊柱起立筋','ハムストリングス','臀筋']],['ショルダープレス','フリーウェイト','reps',['肩 前部','肩 中部','三頭筋']],['ダンベルロウ','フリーウェイト','reps',['広背筋','僧帽筋']],

function seed(){
  let ex=LS.get('pk_ex',null);
  if(!ex){ ex=PRESETS.map((p,i)=>({id:'p'+i,name:p[0],cat:p[1],mode:p[2],parts:p[3]||[],custom:false})); LS.set('pk_ex',ex); }
  if(LS.get('pk_wk',null)===null) LS.set('pk_wk',[]);
  if(LS.get('pk_hist',null)===null) LS.set('pk_hist',[]);
  if(LS.get('pk_rest',null)===null) LS.set('pk_rest',10);
}
seed();
/* ---- 登録済みメニューを初回だけ投入 ---- */

  const R=10, wk=LS.get('pk_wk',[]), hasW=id=>wk.some(w=>w.id===id);

  ]});
  if(!hasW('w_legs')) wk.push({id:'w_legs',name:'脚・スネ',items:[
    {exId:'k_bulg',sets:3,target:'左右 各10回',rest:R},
    {exId:'k_glute',sets:3,target:'15回',rest:R},
    {exId:'k_toe',sets:3,target:'20回',rest:R},

  const ws=b.map(x=>x.weight); const min=Math.min(...ws), max=Math.max(...ws);
  const pad=(max-min)||1, lo=min-pad*0.18, hi=max+pad*0.18, range=(hi-lo)||1;
  const W=300,H=84,n=b.length;
  const X=i=>(n>1?(i/(n-1)):0.5)*(W-10)+5;
  const Y=v=>H-8-((v-lo)/range)*(H-18);
  const pts=b.map((p,i)=>X(i).toFixed(1)+','+Y(p.weight).toFixed(1)).join(' ');
  const dots=b.map((p,i)=>`<circle cx="${X(i).toFixed(1)}" cy="${Y(p.weight).toFixed(1)}" r="2.2" fill="#c8cdd7"/>`).join('');
  return `<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:auto;margin-top:10px"><polyline points="${pts}" fill="none" stroke="#c8cdd7" stroke-width="2"/>${dots}</svg>
    <div class="wk-meta" style="text-align:center">${esc(b[0].date)} 〜 ${esc(b[b.length-1].date)} ・ ${min}〜${max}kg</div>`;
}
function proteinHist(){

function goals(){ return LS.get('pk_goals',[]); }
function goalById(id){ return goals().find(g=>g.id===id); }
function daysLeft(g){ const t=new Date(g.targetDate+'T23:59:59'); return Math.ceil((t.getTime()-Date.now())/86400000); }
function goalPlan(g){
  const out=[]; const sc=g.schedule||{mode:'weekly',weekly:{}};
  const start=new Date((g.startDate||fmt(new Date()))+'T00:00:00');
  const end=new Date(g.targetDate+'T00:00:00'); if(isNaN(end.getTime()))return out;
  if(sc.mode==='weekly'){
    const wk=sc.weekly||{}; let n=0;
    for(let d=new Date(start); d<=end && n<500; d.setDate(d.getDate()+1)){ n++; const mid=wk[d.getDay()]; if(mid&&wkById(mid)) out.push({date:fmt(d),menuId:mid}); }
  } else if(sc.mode==='interval'){
    const N=Math.max(1,sc.intervalN||3), mid=sc.intervalMenu; let n=0;
    if(mid&&wkById(mid)) for(let d=new Date(start); d<=end && n<500; d.setDate(d.getDate()+N)){ n++; out.push({date:fmt(d),menuId:mid}); }
  } else if(sc.mode==='dates'){
    (sc.dates||[]).forEach(x=>{ if(x.menuId&&x.date&&wkById(x.menuId)) out.push({date:x.date,menuId:x.menuId}); });
    out.sort((a,b)=>a.date<b.date?-1:(a.date>b.date?1:0));
  }
  return out;
}
function goalDoneDates(g){ const s=new Set(); LS.get('pk_hist',[]).forEach(h=>{ if(h.goalId===g.id)s.add(h.date); }); return s; }
function goalProgress(g){ const plan=goalPlan(g); const done=goalDoneDates(g); return {total:plan.length, done:plan.filter(p=>done.has(p.date)).length}; }
function viewGoals(){
  const gs=goals();
  const list=gs.map(g=>{ const dl=daysLeft(g); const pr=goalProgress(g);
    return `<div class="card" style="--c:var(--accent);margin-bottom:8px" onclick="openGoalView('${g.id}')">
      <div class="row"><div style="flex:1"><div class="wk-name" style="font-size:16px">🎯 ${esc(g.name)}</div>
      <div class="wk-meta">${dl>=0?'あと'+dl+'日':'期限超過'} ・ 目標日 ${esc(g.targetDate)}</div>
      <div class="wk-meta">消化 ${pr.done}/${pr.total} セッション</div></div>
      <div style="color:var(--dim);font-size:18px">›</div></div></div>`;
  }).join('');
  return `<div class="runhead"><button class="back" onclick="goTab('home')">‹ 戻る</button><div class="wkttl">The Goal</div><div style="width:42px"></div></div>
    <div class="sub">大会や結婚式など、目標日までのトレーニング計画を立てて、確認・実行・記録できます。記録は通常のカレンダー・回復ステータスにも反映されます。</div>

/* ---------- RECOVERY ---------- */
function recovHours(p){ const o=LS.get('pk_recov',{}); return (o[p]!=null?o[p]:(DEFAULT_RECOV[p]||48)); }
function lastTrainedTs(p){ const h=LS.get('pk_hist',[]); let mx=0; h.forEach(x=>{ if((x.parts||[]).includes(p)&&x.ts>mx)mx=x.ts; }); return mx; }
function fmtRemain(hrs){
  const h=Math.max(0,Math.ceil(hrs));
  if(h<24) return `あと約${h}時間`;
  const d=Math.floor(h/24), r=h%24;
  return r?`あと約${d}日${r}時間`:`あと約${d}日`;
}
function recovState(p){
  const last=lastTrainedTs(p);
  if(!last) return {key:'none',label:'記録なし',color:'var(--dim)',remainH:0,manual:false};
  const need=recovHours(p), hrs=(Date.now()-last)/3600000;
  const auto=hrs>=need?'done':'rec';
  const ov=LS.get('pk_recov_ov',{})[p];
  let eff=auto, manual=false;
  if(ov&&ov.ts>=last){
    const st=ov.state==='force'?'done':(ov.state==='sore'?'rec':ov.state); // 旧データ正規化
    if(st==='done'||st==='rec'){ eff=st; manual=(st!==auto); }
  }
  if(eff==='done') return {key:'done',label:'回復完了',color:'var(--go)',remainH:0,manual};
  return {key:'rec',label:'回復中',color:'var(--rest)',remainH:Math.max(0,need-hrs),manual};
}
function cycleRecov(p){
  const last=lastTrainedTs(p); if(!last) return;
  const need=recovHours(p), hrs=(Date.now()-last)/3600000;
  const auto=hrs>=need?'done':'rec';
  const ovs=LS.get('pk_recov_ov',{}); const cur=ovs[p];
  let eff=auto;
  if(cur&&cur.ts>=last){ const st=cur.state==='force'?'done':(cur.state==='sore'?'rec':cur.state); if(st==='done'||st==='rec')eff=st; }
  const next=eff==='done'?'rec':'done';
  if(next===auto) delete ovs[p]; else ovs[p]={state:next,ts:Date.now()};
  LS.set('pk_recov_ov',ovs); render();
}
function custParts(){ return LS.get('pk_custparts',[]); }
function addCustPart(){
  const n=prompt('筋肉名を入力してください（解剖学名でも、自分でつけた名前でもOK 例：右上腕二頭筋／ジャック）');
  if(n==null)return; const nm=n.trim().replace(/['"\\<>]/g,'');
  if(!nm){ return; }
  const cp=custParts(); if(!cp.includes(nm)){ cp.push(nm); LS.set('pk_custparts',cp); }

function saveEx(){
  const e=S.exEdit; if(!e.name.trim()){ alert('種目名を入力してください'); return; }
  if(e.mode!=='cardio' && (!e.parts||!e.parts.length)){
    if(!confirm('部位タグが未設定です。このままだと回復ステータスに反映されません。設定せずに保存しますか？')) return;
  }
  e.name=e.name.trim(); delete e._new;
  const ex=exAll(); const idx=ex.findIndex(x=>x.id===e.id);
  if(idx>=0) ex[idx]=e; else ex.push(e);
  LS.set('pk_ex',ex); S._libCat=e.cat;
  if(S.exEditFrom==='menu'){ S.exEditFrom=null; S.exEdit=null; S.screen='editor'; addItem(e); return; }
  if(S.exEditFrom==='setup'){ S.exEditFrom=null; S.exEdit=null; addSetupItem(e); return; }
  if(S.exEditFrom==='solorun'){
    S.exEditFrom=null; S.exEdit=null;
    const keep=confirm('この種目を種目一覧にも保存しますか？\n「キャンセル」を選ぶと、今回の実行のみで一覧には残しません。');
    if(!keep){ LS.set('pk_ex', exAll().filter(x=>x.id!==e.id)); }
    runSoloFromEx(e, keep?e.id:null); return;
  }
  backToSet('exercises');
}

    big=`<div class="exname" style="color:var(--cardio)">${esc(it.name)}</div>
      <div class="two" style="width:100%;max-width:300px;margin-top:8px">
        <input class="in mono" id="cardio_km" inputmode="decimal" placeholder="距離 km">
        <input class="in mono" id="cardio_min" inputmode="decimal" placeholder="時間 分"></div>`;
    acts=`<button class="btn btn-accent" onclick="cardioDone()">記録して次へ ▸</button><button class="ghost" onclick="skipItem()">スキップ ▸</button>`;
  } else if(r.phase==='rest'){ tag=r.restKind==='gap'?'種目間 休憩':'セット間 休憩'; color='var(--rest)';
    big=`<div class="bignum mono" style="color:${color}">${r.t}</div><div class="unit">秒　▶ ${esc(nx||'ラスト')}</div>`;
    acts=`<button class="btn btn-accent" onclick="restSkip()">休憩をスキップ ▸</button>`;
  }
  const undoBtn = canUndo()? `<button class="back" onclick="undo()" style="color:var(--accent)">⟲ 取消</button>` : `<div style="width:52px"></div>`;
  return `<div class="runhead"><button class="back" onclick="quitRun()">‹ 中断</button><div class="wkttl">${esc(r.name)}</div>${undoBtn}</div>
    <div class="prog"><i style="width:${pct}%"></i></div>
    <div class="counter">種目 ${r.ii+1}/${r.items.length}　・　セット ${r.si+1}/${sc}</div>
    <div class="stage"><div class="phase-tag" style="color:${color}">${tag}</div>
      <div class="exname">${r.phase==='cardio'?'':esc(it.name)}</div>${big}
      <div class="pips">${pips}</div>
      ${r.phase!=='rest'&&r.phase!=='cardio'?`<div class="next">${nextLine}</div>`:''}</div>
    <div class="acts">${acts}</div>
    <button class="ghost" onclick="openPicker()" style="margin-top:10px;width:100%">≡ 種目を選択して移動</button>
    ${canUndo()?'<div class="next" style="margin-top:8px">誤って操作した場合は、右上の「⟲ 取消」で直前の操作を取り消せます。</div>':''}`;
}

function viewDone(){
  const r=S.run, ses=r.session;
  const rows=ses.items.map((x,i)=>{
    const on=ses.include[i];
    return `<div class="card" style="--c:${on?'var(--go)':'var(--line)'};opacity:${on?1:.5};margin-bottom:8px" onclick="toggleInclude(${i})">
      <div class="row"><div><div class="wk-name" style="font-size:15px">${on?'✓':'✕'} ${esc(x.name)}</div>
      <div class="wk-meta">${esc(x.summary)}${x.done?'':' ・ <span style="color:var(--rest)">スキップ</span>'}</div></div>
      <div style="color:var(--dim);font-size:12px">${on?'記録する':'除外'}</div></div></div>`;
  }).join('');
  const incN=ses.include.filter(Boolean).length;
  return `<div class="top"><div class="logo">🔥 完了サマリー</div></div>
    <div class="sub"><b style="color:var(--accent)">${esc(r.name)}</b> お疲れさまでした。<br>実際に行った種目にチェックを残して保存してください。タップで切り替えられます（誤って記録された分は、こちらで除外できます）。</div>
    ${rows}
    <div class="acts" style="margin-top:14px">
      <button class="btn btn-primary" onclick="saveSession()">${incN}種目を記録して終了</button>
      <button class="ghost" onclick="doneUndo()">⟲ 実行に戻る</button>
      <button class="ghost" onclick="discardSession()" style="color:var(--danger)">破棄して終了</button>
    </div>
    <div class="note">記録した種目の部位のみ、回復ステータスの計算に使われます（実施していない種目は影響しません）。</div>`;
}

/* ---------- CALENDAR ---------- */
function fmt(d){ return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function calNav(){ if(!S.calMonth) S.calMonth=new Date(new Date().getFullYear(),new Date().getMonth(),1); const m=S.calMonth; return `<div class="cal-head"><button class="mini" onclick="calMove(-1)">‹ 前月</button><div style="font-weight:700">${m.getFullYear()}年 ${m.getMonth()+1}月</div><button class="mini" onclick="calMove(1)">翌月 ›</button></div>`; }
function calCells(layer){
  if(!S.calMonth) S.calMonth=new Date(new Date().getFullYear(),new Date().getMonth(),1);
  const m=S.calMonth, y=m.getFullYear(), mo=m.getMonth();
  const first=new Date(y,mo,1).getDay(), days=new Date(y,mo+1,0).getDate(); const todayS=fmt(new Date());
  let cells=''; ['日','月','火','水','木','金','土'].forEach(d=>cells+=`<div class="cal-dow">${d}</div>`);
  for(let i=0;i<first;i++) cells+=`<div class="cal-cell empty"></div>`;
  for(let d=1;d<=days;d++){ const ds=y+'-'+String(mo+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    cells+=`<div class="cal-cell has ${ds===todayS?'today':''} ${S.calSel===ds?'sel':''}" onclick="S.calSel='${ds}';render()">${d}${calDeco(layer,ds)}</div>`; }
  return cells;
}
function calDeco(layer,ds){
  if(layer==='body'){ return bodyLog().some(x=>x.date===ds)?'<span class="dot" style="background:#c8cdd7"></span>':''; }
  if(layer==='supp'){ const ids=LS.get('pk_supplog',{})[ds]||[]; if(!ids.length)return ''; const list=supps(); const ic=ids.map(id=>{const s=list.find(x=>x.id===id);return s?(s.icon||'💊'):'';}).filter(Boolean).slice(0,3).join(''); return `<span class="cal-ic">${ic}</span>`; }
  if(layer==='protein'){ const g=LS.get('pk_proteinlog',{})[ds]||0; if(!g)return ''; const tgt=proteinTarget(); const pct=tgt?Math.min(100,Math.round(g/tgt*100)):100; const met=tgt&&g>=tgt; return `<span class="cal-bar"><i style="width:${pct}%;background:${met?'#22c55e':'#f59e0b'}"></i></span>`; }
  const has=LS.get('pk_hist',[]).some(h=>h.date===ds); const note=LS.get('pk_notes',{})[ds];
  return (has?'<span class="dot"></span>':'')+(note?'<span class="dot note"></span>':'');
}
function calDetail(layer){
  if(!S.calSel) return '';
  const ds=S.calSel;
  if(layer==='body'){ const e=bodyLog().find(x=>x.date===ds); return `<div class="h2">${ds}</div>`+(e?`<div class="card" style="--c:#c8cdd7"><div class="wk-name" style="font-size:15px">${e.weight} kg${e.bf!=null?' ・ 体脂肪 '+e.bf+'%':''}</div></div>`:'<div class="wk-meta">この日の身体データはありません。</div>')+'<div class="note">身体データの登録・編集は「健康管理 → プロフィール／身体データ」から行えます。</div>'; }
  if(layer==='supp'){ const ids=LS.get('pk_supplog',{})[ds]||[]; const list=supps(); return `<div class="h2">${ds}</div>`+(ids.length?ids.map(id=>{const s=list.find(x=>x.id===id);return s?`<div class="sess"><div class="d">${s.icon||'💊'} ${esc(s.name)}${s.maker?'　<span style="color:var(--dim);font-weight:400">'+esc(s.maker)+'</span>':''}</div></div>`:'';}).join(''):'<div class="wk-meta">この日のサプリ記録はありません。</div>'); }
  if(layer==='protein'){ const g=LS.get('pk_proteinlog',{})[ds]||0; const tgt=proteinTarget(); const pct=tgt?Math.min(100,Math.round(g/tgt*100)):0; return `<div class="h2">${ds}</div><div class="card" style="--c:#f59e0b"><div class="prog"><i style="width:${pct}%;background:${tgt&&g>=tgt?'#22c55e':'#f59e0b'}"></i></div><div class="wk-meta" style="margin-top:5px">${g}g${tgt?(' / '+tgt+'g（'+pct+'%）'):''}</div></div>`; }
  const byd=LS.get('pk_hist',[]).filter(h=>h.date===ds); const note=LS.get('pk_notes',{})[ds]||'';
  return `<div class="h2">${ds}</div>`+
    (byd.length? byd.map(h=>`<div class="sess"><div class="row"><div class="d" style="flex:1">${esc(h.name)}${h.manual?' <span style="color:var(--dim);font-weight:400">(手動)</span>':''}${h.goalId?' <span style="color:var(--accent);font-weight:400">🎯</span>':''}</div><button class="del" onclick="delRecord('${h.id||h.ts}')">削除</button></div><div class="b">${(h.log||[]).map(esc).join('<br>')||'記録'}${h.parts&&h.parts.length?'<br><span style="color:var(--dim)">部位: '+h.parts.map(esc).join('・')+'</span>':''}</div></div>`).join('') : '<div class="wk-meta" style="margin-bottom:8px">この日のトレーニング記録はありません</div>')+
    `<label class="fld"><span class="lb">📝 メモ（気づき・課題・次やること）</span><textarea class="in" id="dayNote" rows="3" style="resize:vertical" placeholder="例：腕が辛くて胸に効かせきれなかった。フォーム見直しか、腕の補強を追加。">${esc(note)}</textarea></label>
      <button class="mini" onclick="saveNote('${ds}')">メモを保存</button>
      <button class="btn-line" style="margin-top:12px" onclick="openLogAdd('${ds}','cal')">＋ この日にトレ記録を追加</button>`;
}
function viewCal(){
  if(!S.calMonth) S.calMonth=new Date(new Date().getFullYear(),new Date().getMonth(),1);
  if(!S.calLayer) S.calLayer='train';
  const layer=S.calLayer;
  const segs=[['train','トレ'],['body','身体'],['supp','サプリ'],['protein','タンパク質']];
  const seg=segs.map(s=>`<button class="${layer===s[0]?'on':''}" onclick="S.calLayer='${s[0]}';render()">${s[1]}</button>`).join('');
  const hints={train:'実施日に色が付きます。日付をタップで記録とメモ。',body:'体重を記録した日にドットが付きます。',supp:'サプリを摂取した日にアイコンが付きます。',protein:'タンパク質の達成バーが日ごとに付きます。'};
  return `<div class="top"><div class="logo">📅 カレンダー</div></div>
    <div class="cal-seg">${seg}</div>
    <div class="sub">${hints[layer]}</div>
    ${calNav()}
    <div class="cal-grid">${calCells(layer)}</div>
    ${layer==='train'?`<button class="btn-line" style="margin:12px 0" onclick="openLogAdd(todayStr(),'cal')">＋ 今日の記録を追加（タイマーなし）</button>`:'<div style="height:8px"></div>'}
    ${calDetail(layer)||'<div class="note">日付をタップすると、その日の内容を表示します。</div>'}`;
}
function saveNote(ds){ const t=document.getElementById('dayNote'); const v=(t?t.value:'').trim(); const notes=LS.get('pk_notes',{}); if(v) notes[ds]=v; else delete notes[ds]; LS.set('pk_notes',notes); render(); }
function delRecord(key){ if(!confirm('この記録を削除しますか？'))return; const h=LS.get('pk_hist',[]).filter(x=>String(x.id||x.ts)!==String(key)); LS.set('pk_hist',h); render(); }
function calMove(d){ const m=S.calMonth; S.calMonth=new Date(m.getFullYear(),m.getMonth()+d,1); S.calSel=null; render(); }

/* ---------- util ---------- */
function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

render();
</script>
</body>
</html>
